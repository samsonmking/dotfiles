set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tpm'

# Increase history Limit
set -g history-limit 100000

# Enable 256 colors
set-option -sa terminal-overrides ",xterm*:Tc"

#Enable mouse mode
set -g mouse on

# Use space as prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# resize panes using Alt-Control + vim keys
bind -n C-M-k resize-pane -U 5
bind -n C-M-j resize-pane -D 5
bind -n C-M-h resize-pane -L 5
bind -n C-M-l resize-pane -R 5

# swap windows using Alt-Shift + vim keys
bind-key -n "M-H" swap-window -t -1\; select-window -t -1
bind-key -n "M-L" swap-window -t +1\; select-window -t +1

# swap panes using Alt-Shift-G + vim keys
bind-key -n M-G switch-client -T pane-move
bind-key -T pane-move M-H run-shell 'tmux select-pane -L; tmux swap-pane -t "#{pane_id}"'
bind-key -T pane-move M-J run-shell 'tmux select-pane -D; tmux swap-pane -t "#{pane_id}"'
bind-key -T pane-move M-K run-shell 'tmux select-pane -U; tmux swap-pane -t "#{pane_id}"'
bind-key -T pane-move M-L run-shell 'tmux select-pane -R; tmux swap-pane -t "#{pane_id}"'

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Alt + vim keys to switch windows
bind -n M-h previous-window
bind -n M-l next-window

# Swap between windows using Alt 0-9
bind-key -n M-1 select-window -t :1
bind-key -n M-2 select-window -t :2
bind-key -n M-3 select-window -t :3
bind-key -n M-4 select-window -t :4
bind-key -n M-5 select-window -t :5
bind-key -n M-6 select-window -t :6
bind-key -n M-7 select-window -t :7
bind-key -n M-8 select-window -t :8
bind-key -n M-9 select-window -t :9
bind-key -n M-0 select-window -t :0
bind-key -n "M-i" select-window -n
bind-key -n "M-o" select-window -p

# Vi-mode
set-window-option -g mode-keys vi
# Vi-mode yank keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Open split in same directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Easy reload of config file
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# DESIGN TWEAKS
# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# clock mode
setw -g clock-mode-colour yellow

# copy mode
setw -g mode-style 'fg=black bg=cyan'

# panes
set -g pane-border-style 'fg=gray'
set -g pane-active-border-style 'fg=cyan'

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=cyan'
set -g status-left ' #S '
set -g status-left-style 'fg=black bg=violet'
set -g status-left-length 30
set -g status-right-style 'fg=black bg=yellow'
set -g status-right ' #H '
set -g status-right-length 50
setw -g window-status-current-style 'fg=black bg=cyan'
setw -g window-status-current-format ' #I #W '
setw -g window-status-style 'fg=cyan bg=black'
setw -g window-status-format ' #I #[fg=white]#W #[fg=yellow] '
setw -g window-status-bell-style 'fg=yellow bg=cyan bold'
set-window-option -g window-status-separator ''

# messages
set -g message-style 'fg=white bg=cyan bold'

# equally resize all panes on prefix + T
bind T select-layout even-vertical

run '~/.tmux/plugins/tpm/tpm'
